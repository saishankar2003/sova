name: Deploy to Staging

on:
  push:
    branches:
      - test

jobs:
  deploy-frontend:
    name: Deploy Web App to Vercel
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build Project Artifacts
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Project Artifacts to Vercel
        run: vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}

  deploy-backend:
    name: Deploy API to Render / Railway
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Webhook Deploy
        run: |
          if [ -n "${{ secrets.DEPLOY_WEBHOOK_URL }}" ]; then
            echo "🚀 Triggering API deploy webhook..."
            curl -s -X POST "${{ secrets.DEPLOY_WEBHOOK_URL }}"
            echo "✅ Deployment triggered successfully!"
          else
            echo "⚠️ DEPLOY_WEBHOOK_URL secret is not set, skipping API deploy webhook."
          fi
